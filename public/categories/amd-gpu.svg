<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#111"/>
  <!-- PCB -->
  <rect x="5" y="22" width="88" height="56" rx="5" fill="#1a0808" stroke="#3a1010" stroke-width="1.5"/>
  <!-- Fan 1 -->
  <circle cx="32" cy="50" r="19" fill="#080808" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M32 31 L37 45 L32 50 L27 45Z" fill="#111"/>
  <path d="M51 50 L37 55 L32 50 L37 45Z" fill="#111"/>
  <path d="M32 69 L27 55 L32 50 L37 55Z" fill="#111"/>
  <path d="M13 50 L27 45 L32 50 L27 55Z" fill="#111"/>
  <circle cx="32" cy="50" r="7" fill="#1a0808" stroke="#5a1a1a" stroke-width="1"/>
  <circle cx="32" cy="50" r="2.5" fill="#1a1a1a"/>
  <!-- Fan 2 -->
  <circle cx="65" cy="50" r="19" fill="#080808" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M65 31 L70 45 L65 50 L60 45Z" fill="#111"/>
  <path d="M84 50 L70 55 L65 50 L70 45Z" fill="#111"/>
  <path d="M65 69 L60 55 L65 50 L70 55Z" fill="#111"/>
  <path d="M46 50 L60 45 L65 50 L60 55Z" fill="#111"/>
  <circle cx="65" cy="50" r="7" fill="#1a0808" stroke="#5a1a1a" stroke-width="1"/>
  <circle cx="65" cy="50" r="2.5" fill="#1a1a1a"/>
  <!-- AMD red accent strip -->
  <rect x="5" y="22" width="88" height="6" rx="5" fill="#ed1c24"/>
  <!-- AMD + Radeon text -->
  <text x="49" y="27.5" font-family="Arial,sans-serif" font-size="4.5" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.5">AMD Radeon</text>
  <!-- PCIe -->
  <rect x="8" y="75" width="55" height="5" rx="1" fill="#0d0d0d" stroke="#2a1010"/>
  <!-- Power connectors -->
  <rect x="80" y="30" width="12" height="6" rx="1" fill="#1a1a1a" stroke="#333"/>
  <rect x="80" y="38" width="12" height="6" rx="1" fill="#1a1a1a" stroke="#333"/>
</svg>
