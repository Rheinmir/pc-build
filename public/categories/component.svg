<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#111"/>
  <!-- Generic PCB -->
  <rect x="10" y="10" width="80" height="80" rx="5" fill="#1a1a14" stroke="#2a2a1e" stroke-width="1.5"/>
  <!-- Chip center -->
  <rect x="30" y="30" width="40" height="40" rx="4" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="36" y="36" width="28" height="28" rx="2" fill="#1a1a1a"/>
  <!-- Traces -->
  <line x1="50" y1="10" x2="50" y2="30" stroke="#2a2a1e" stroke-width="1.5"/>
  <line x1="30" y1="50" x2="10" y2="50" stroke="#2a2a1e" stroke-width="1.5"/>
  <line x1="70" y1="50" x2="90" y2="50" stroke="#2a2a1e" stroke-width="1.5"/>
  <line x1="50" y1="70" x2="50" y2="90" stroke="#2a2a1e" stroke-width="1.5"/>
  <!-- Small components -->
  <rect x="18" y="20" width="8" height="5" rx="1" fill="#1a1a0d" stroke="#333" stroke-width="0.5"/>
  <rect x="18" y="28" width="8" height="5" rx="1" fill="#1a1a0d" stroke="#333" stroke-width="0.5"/>
  <rect x="74" y="20" width="8" height="5" rx="1" fill="#1a1a0d" stroke="#333" stroke-width="0.5"/>
  <rect x="74" y="75" width="8" height="5" rx="1" fill="#1a1a0d" stroke="#333" stroke-width="0.5"/>
  <!-- Capacitors -->
  <circle cx="20" cy="75" r="4" fill="#1a1a0d" stroke="#2a2a1a" stroke-width="1"/>
  <circle cx="80" cy="75" r="4" fill="#1a1a0d" stroke="#2a2a1a" stroke-width="1"/>
</svg>
