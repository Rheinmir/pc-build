<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#111"/>
  <!-- Case outer body -->
  <rect x="20" y="8" width="55" height="84" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <!-- Tempered glass panel -->
  <rect x="25" y="13" width="40" height="58" rx="3" fill="#0d1e1e" stroke="#1a3535" stroke-width="1" opacity="0.9"/>
  <!-- Inside: GPU (visible through glass) -->
  <rect x="30" y="18" width="30" height="14" rx="2" fill="#14221a" stroke="#1e3328" stroke-width="0.5"/>
  <circle cx="38" cy="25" r="5" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="38" cy="25" r="1.5" fill="#111"/>
  <circle cx="50" cy="25" r="5" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="50" cy="25" r="1.5" fill="#111"/>
  <!-- Inside: CPU cooler fan -->
  <circle cx="45" cy="50" r="14" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1" opacity="0.7"/>
  <circle cx="45" cy="50" r="4" fill="#111"/>
  <!-- Inside: PSU at bottom -->
  <rect x="29" y="63" width="32" height="7" rx="2" fill="#111" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Front panel: power button -->
  <circle cx="32" cy="84" r="4" fill="#0d0d0d" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="32" cy="84" r="1.5" fill="#222"/>
  <!-- Front panel: USB ports -->
  <rect x="43" y="81" width="7" height="5" rx="1" fill="#0d0d0d" stroke="#333" stroke-width="0.5"/>
  <rect x="53" y="81" width="7" height="5" rx="1" fill="#0d0d0d" stroke="#333" stroke-width="0.5"/>
  <!-- Case feet -->
  <rect x="23" y="89" width="8" height="4" rx="2" fill="#222"/>
  <rect x="64" y="89" width="8" height="4" rx="2" fill="#222"/>
</svg>
