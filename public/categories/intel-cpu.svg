<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0a0a0a"/>
  <!-- IHS (Integrated Heat Spreader) - silver metal -->
  <rect x="15" y="15" width="70" height="70" rx="6" fill="url(#ihs)" stroke="#555" stroke-width="1.5"/>
  <defs>
    <linearGradient id="ihs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8c8c8"/>
      <stop offset="40%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
  </defs>
  <!-- Die window -->
  <rect x="28" y="28" width="44" height="44" rx="3" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <!-- Die surface -->
  <rect x="31" y="31" width="38" height="38" rx="2" fill="#0d0d1a"/>
  <!-- Die grid pattern -->
  <line x1="40" y1="31" x2="40" y2="69" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="50" y1="31" x2="50" y2="69" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="60" y1="31" x2="60" y2="69" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="31" y1="40" x2="69" y2="40" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="31" y1="50" x2="69" y2="50" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="31" y1="60" x2="69" y2="60" stroke="#1a1a2e" stroke-width="0.5"/>
  <!-- Intel blue accent bar -->
  <rect x="15" y="77" width="70" height="8" rx="0" fill="#0068b5"/>
  <rect x="15" y="77" width="70" height="8" rx="0" fill="#0068b5" opacity="0.9"/>
  <!-- intel text -->
  <text x="50" y="84.5" font-family="Arial,sans-serif" font-size="5.5" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">intel</text>
  <!-- Corner marks on IHS -->
  <rect x="18" y="18" width="5" height="5" rx="1" fill="#aaa"/>
  <rect x="77" y="18" width="5" height="5" rx="1" fill="#aaa"/>
  <rect x="18" y="77" width="5" height="5" rx="1" fill="#aaa"/>
  <rect x="77" y="77" width="5" height="5" rx="1" fill="#aaa"/>
</svg>
