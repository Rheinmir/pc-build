<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#111"/>
  <!-- PSU body -->
  <rect x="8" y="15" width="84" height="70" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <!-- Fan grill -->
  <circle cx="36" cy="50" r="24" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="36" cy="50" r="17" fill="none" stroke="#252525" stroke-width="1"/>
  <circle cx="36" cy="50" r="9" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="36" cy="50" r="3" fill="#222"/>
  <!-- Grill lines -->
  <line x1="36" y1="26" x2="36" y2="74" stroke="#222" stroke-width="1"/>
  <line x1="12" y1="50" x2="60" y2="50" stroke="#222" stroke-width="1"/>
  <line x1="19" y1="33" x2="53" y2="67" stroke="#222" stroke-width="1"/>
  <line x1="53" y1="33" x2="19" y2="67" stroke="#222" stroke-width="1"/>
  <!-- Cable panel -->
  <rect x="68" y="20" width="18" height="60" rx="3" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="70" y="24" width="14" height="4" rx="1" fill="#1e1e1e"/>
  <rect x="70" y="31" width="14" height="4" rx="1" fill="#1e1e1e"/>
  <rect x="70" y="38" width="14" height="4" rx="1" fill="#1e1e1e"/>
  <rect x="70" y="45" width="14" height="4" rx="1" fill="#1e1e1e"/>
  <rect x="70" y="52" width="14" height="4" rx="1" fill="#1e1e1e"/>
  <rect x="70" y="59" width="14" height="4" rx="1" fill="#1e1e1e"/>
  <rect x="70" y="66" width="14" height="4" rx="1" fill="#1e1e1e"/>
  <rect x="70" y="73" width="14" height="4" rx="1" fill="#1e1e1e"/>
  <!-- Power switch -->
  <rect x="12" y="78" width="16" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="12" y="78" width="8" height="6" rx="3" fill="#3a3a3a"/>
