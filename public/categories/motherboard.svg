<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#111"/>
  <!-- PCB -->
  <rect x="5" y="5" width="90" height="90" rx="5" fill="#14261a" stroke="#1e3d28" stroke-width="1.5"/>
  <!-- CPU socket -->
  <rect x="12" y="12" width="32" height="32" rx="3" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1"/>
  <rect x="17" y="17" width="22" height="22" rx="2" fill="#0a120a"/>
  <!-- Dots in socket -->
  <circle cx="22" cy="22" r="1" fill="#2a4a2a"/>
  <circle cx="28" cy="22" r="1" fill="#2a4a2a"/>
  <circle cx="34" cy="22" r="1" fill="#2a4a2a"/>
  <circle cx="22" cy="28" r="1" fill="#2a4a2a"/>
  <circle cx="28" cy="28" r="1.5" fill="#3a5a3a"/>
  <circle cx="34" cy="28" r="1" fill="#2a4a2a"/>
  <circle cx="22" cy="34" r="1" fill="#2a4a2a"/>
  <circle cx="28" cy="34" r="1" fill="#2a4a2a"/>
  <circle cx="34" cy="34" r="1" fill="#2a4a2a"/>
  <!-- RAM slots -->
  <rect x="52" y="10" width="7" height="42" rx="1" fill="#0d1a2a" stroke="#1a2a4a" stroke-width="1"/>
  <rect x="62" y="10" width="7" height="42" rx="1" fill="#0d1a2a" stroke="#1a2a4a" stroke-width="1"/>
  <rect x="72" y="10" width="7" height="42" rx="1" fill="#0d1a2a" stroke="#1a2a4a" stroke-width="1"/>
  <rect x="82" y="10" width="7" height="42" rx="1" fill="#0d1a2a" stroke="#1a2a4a" stroke-width="1"/>
  <!-- PCIe slots -->
  <rect x="10" y="60" width="58" height="5" rx="1" fill="#1a1a0d" stroke="#3a3a1a" stroke-width="1"/>
  <rect x="10" y="70" width="42" height="5" rx="1" fill="#1a1a0d" stroke="#3a3a1a" stroke-width="1"/>
  <rect x="10" y="80" width="58" height="5" rx="1" fill="#1a1a0d" stroke="#3a3a1a" stroke-width="1"/>
  <!-- 24-pin power -->
  <rect x="75" y="58" width="16" height="28" rx="2" fill="#1a0d0d" stroke="#3a1a1a" stroke-width="1"/>
  <rect x="77" y="61" width="4" height="4" rx="0.5" fill="#2a1a1a"/>
  <rect x="83" y="61" width="4" height="4" rx="0.5" fill="#2a1a1a"/>
  <rect x="77" y="67" width="4" height="4" rx="0.5" fill="#2a1a1a"/>
  <rect x="83" y="67" width="4" height="4" rx="0.5" fill="#2a1a1a"/>
  <rect x="77" y="73" width="4" height="4" rx="0.5" fill="#2a1a1a"/>
  <rect x="83" y="73" width="4" height="4" rx="0.5" fill="#2a1a1a"/>
</svg>
