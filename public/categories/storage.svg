<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#111"/>
  <!-- SSD body -->
  <rect x="8" y="22" width="84" height="56" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <!-- Label sticker -->
  <rect x="16" y="30" width="46" height="36" rx="3" fill="#222" stroke="#2a2a2a" stroke-width="0.5"/>
  <!-- Sticker lines -->
  <rect x="20" y="36" width="30" height="2.5" rx="1" fill="#333"/>
  <rect x="20" y="41" width="22" height="2" rx="1" fill="#2a2a2a"/>
  <rect x="20" y="45" width="26" height="2" rx="1" fill="#2a2a2a"/>
  <rect x="20" y="53" width="10" height="5" rx="1" fill="#1a2a1a" stroke="#2a4a2a" stroke-width="0.5"/>
  <!-- SATA power connector -->
  <rect x="68" y="32" width="18" height="10" rx="2" fill="#0d0d0d" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="70" y="34" width="5" height="6" rx="0.5" fill="#2a2a2a"/>
  <rect x="77" y="34" width="5" height="6" rx="0.5" fill="#2a2a2a"/>
  <!-- SATA data connector -->
  <rect x="68" y="46" width="18" height="8" rx="2" fill="#0d0d0d" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="70" y="48" width="14" height="4" rx="0.5" fill="#2a2a2a"/>
  <!-- Screw holes -->
  <circle cx="14" cy="28" r="3" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="86" cy="28" r="3" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="14" cy="72" r="3" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="86" cy="72" r="3" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
</svg>
