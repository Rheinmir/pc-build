  <rect x="33" y="51" width="16" height="16" rx="1" fill="#1a1a3a" stroke="#2a2a55" stroke-width="0.5"/>
  <rect x="51" y="51" width="16" height="16" rx="1" fill="#1a1a3a" stroke="#2a2a55" stroke-width="0.5"/>
  <!-- Pins top -->
  <line x1="30" y1="16" x2="30" y2="22" stroke="#888" stroke-width="2"/>
  <line x1="38" y1="16" x2="38" y2="22" stroke="#888" stroke-width="2"/>
  <line x1="46" y1="16" x2="46" y2="22" stroke="#888" stroke-width="2"/>
