  <line x1="78" y1="30" x2="84" y2="30" stroke="#888" stroke-width="2"/>
  <line x1="78" y1="38" x2="84" y2="38" stroke="#888" stroke-width="2"/>
  <line x1="78" y1="46" x2="84" y2="46" stroke="#888" stroke-width="2"/>
