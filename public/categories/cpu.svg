<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#111"/>
  <!-- Chip body -->
  <rect x="22" y="22" width="56" height="56" rx="5" fill="#1a1a2e" stroke="#2a2a50" stroke-width="2"/>
  <!-- Die -->
  <rect x="30" y="30" width="40" height="40" rx="3" fill="#0d0d1a"/>
  <!-- Die details -->
  <rect x="33" y="33" width="16" height="16" rx="1" fill="#1a1a3a" stroke="#2a2a55" stroke-width="0.5"/>
